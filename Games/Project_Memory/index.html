<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
  <meta charset="utf-8">
  <title>Memory Game</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>
  <a href="../../index.html"
    style="position: absolute; top: 20px; left: 20px; text-decoration: none; color: white; font-family: sans-serif; background: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 5px; border: 1px solid white; z-index: 1000;">&larr;
    Back to Hub</a>

  <div class="game-container">
    <h1 id="level-title">Select Difficulty</h1>

    <div id="difficulty-selector" class="control-panel">
      <button id="easy" class="diff-btn">Easy</button>
      <button id="medium" class="diff-btn">Medium</button>
      <button id="hard" class="diff-btn">Hard</button>
    </div>

    <div class="row">
      <div type="button" id="green" class="btn green"></div>
      <div type="button" id="red" class="btn red"></div>
    </div>

    <div class="row">
      <div type="button" id="yellow" class="btn yellow"></div>
      <div type="button" id="blue" class="btn blue"></div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.js" integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4="
    crossorigin="anonymous"></script>
  <script src="./game.js"></script>
</body>

</html>
