<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rock Paper Scissors</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <a href="../../index.html"
    style="position: absolute; top: 20px; left: 20px; text-decoration: none; color: white; font-family: sans-serif; background: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 5px; border: 1px solid white; z-index: 1000;">&larr;
    Back to Hub</a>
  <!-- Landing: choose Best of 1 / 3 / 5 -->
  <section class="landing-page" id="landing-page">
    <header>
      <h1>Rock Paper Scissors</h1>
    </header>
    <p class="landing-subtitle">Choose your match length</p>
    <div class="mode-options">
      <button type="button" class="mode-btn" data-rounds="1">Best of 1</button>
      <button type="button" class="mode-btn" data-rounds="3">Best of 3</button>
      <button type="button" class="mode-btn" data-rounds="5">Best of 5</button>
    </div>
  </section>

  <!-- Game screen -->
  <section class="game-screen hidden" id="game-screen">
    <header>
      <h1>Rock Paper Scissors</h1>
      <p class="match-info" id="match-info"></p>
    </header>

    <section class="scoreboard">
      <div class="score-block">
        <span class="score-label">You</span>
        <span id="user-score">0</span>
      </div>
      <span class="score-separator">–</span>
      <div class="score-block">
        <span class="score-label">Comp</span>
        <span id="computer-score">0</span>
      </div>
    </section>

    <!-- Battle area: user choice vs computer choice -->
    <div class="battle-area">
      <div class="battle-side user-side">
        <p class="battle-label">You</p>
        <div class="battle-choice" id="user-battle-choice">
          <!--span class="placeholder-text">Your choice</span-->
          <img class="choice-img hidden" id="user-choice-img" src="" alt="">
        </div>
      </div>
      <div class="battle-vs">VS</div>
      <div class="battle-side comp-side">
        <p class="battle-label">Computer</p>
        <div class="battle-choice" id="comp-battle-choice">
          <span class="placeholder-text" id="comp-placeholder">?</span>
          <img class="choice-img hidden" id="comp-choice-img" src="" alt="">
        </div>
      </div>
    </div>

    <div class="result-area">
      <p id="result-message">Make your move</p>
    </div>

    <div class="select-choice-section">
      <p class="select-choice-label">Select your choice</p>
      <div class="choices-container">
        <div class="choice" id="rock" data-choice="rock" title="Rock">
          <img src="assets/rock.png" alt="Rock">
        </div>
        <div class="choice" id="paper" data-choice="paper" title="Paper">
          <img src="assets/paper.png" alt="Paper">
        </div>
        <div class="choice" id="scissors" data-choice="scissors" title="Scissors">
          <img src="assets/scissors.png" alt="Scissors">
        </div>
      </div>
    </div>

    <div class="game-over-area hidden" id="game-over-area">
      <p id="game-over-message"></p>
      <button type="button" class="play-again-btn" id="play-again-btn">Play again</button>
    </div>
  </section>

  <audio id="point-sfx" preload="auto">
    <source src="assets/Point_SFX.mp3" type="audio/mpeg">
  </audio>
  <audio id="gameover-sfx" preload="auto">
    <source src="assets/Game_Over_SFX.mp3" type="audio/mpeg">
  </audio>

  <script src="script.js"></script>
</body>

</html>
