<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Hub - Minimalist Gaming</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Press+Start+2P&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="custom-cursor"></div>
    <div class="cursor-follower"></div>

    <main class="container">
        <header class="header">
            <h1 class="fade-in">GAME <span class="highlight">HUB</span></h1>
            <p class="subtitle fade-in delay-1">Choose your challenge</p>
        </header>

        <section class="games-grid">
            <a href="Games/Project_Memory/index.html" class="game-card fade-in delay-2" data-game="memory">
                <div class="card-content">
                    <div class="icon-wrapper">
                        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path
                                d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2Z" />
                            <path
                                d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 14.5 2Z" />
                        </svg>
                    </div>
                    <h2>Memory</h2>
                    <p>Test your cognitive skills</p>
                </div>
                <div class="card-bg"></div>
            </a>

            <a href="Games/Project_RPS/index.html" class="game-card fade-in delay-3" data-game="rps">
                <div class="card-content">
                    <div class="icon-wrapper">
                        <!-- Custom RPS Icon (Fist vs Scissors) -->
                        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <!-- Rock (Left Fist) -->
                            <path
                                d="M7.5 11c0-1-1-2-2-2s-2 1-2 2c0 1.5 1 2.5 1 4 0 .5-.5 1.5-1.5 2 1.5 1.5 4.5 1.5 6 0 .5-.5 1.5-1.5 1.5-3 0-2-3-2-3-3z" />
                            <path d="M4 11c-1 0-2 .5-2 1.5" />
                            <path d="M4.5 9.5c0-1 1-1.5 2-1.5" />

                            <!-- Scissors (Right Hand) -->
                            <path d="M18 10l-2-4" />
                            <path d="M18 10l2-4" />
                            <path d="M18 10v4c0 1.5-1 2-2 3s-3 .5-4-1" />
                            <circle cx="18" cy="10" r="1.5" />
                        </svg>
                    </div>
                    <h2>RPS</h2>
                    <p>Rock, Paper, Scissors</p>
                </div>
                <div class="card-bg"></div>
            </a>

            <a href="Games/Project_Snake/index.html" class="game-card fade-in delay-4" data-game="snake">
                <div class="card-content">
                    <div class="icon-wrapper">
                        <!-- Custom Snake Icon (Handheld Console) -->
                        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="6" y="2" width="12" height="20" rx="2" ry="2" />
                            <rect x="8" y="5" width="8" height="8" rx="1" />
                            <path d="M9 11h2v-2" />
                            <circle cx="11" cy="9" r="0.5" fill="currentColor" />
                            <line x1="9" y1="17" x2="11" y2="17" />
                            <line x1="10" y1="16" x2="10" y2="18" />
                            <circle cx="14" cy="17" r="1" />
                        </svg>
                    </div>
                    <h2>Snake</h2>
                    <p>Classic retro fun</p>
                </div>
                <div class="card-bg"></div>
            </a>

            <a href="Games/Project_Tetris/index.html" class="game-card fade-in delay-5" data-game="tetris">
                <div class="card-content">
                    <div class="icon-wrapper">
                        <!-- Custom Tetris Icon (Falling Blocks) -->
                        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <!-- T-Piece (Top Right) -->
                            <path d="M16 4h4v4h-4z" />
                            <path d="M20 4h4v4h-4z" />
                            <path d="M20 8h4v4h-4z" />
                            <path d="M20 0h4v4h-4z" transform="translate(-4, 0)" />

                            <!-- L-Piece (Bottom Left) -->
                            <rect x="4" y="14" width="4" height="4" />
                            <rect x="4" y="18" width="4" height="4" />
                            <rect x="8" y="18" width="4" height="4" />
                            <rect x="12" y="18" width="4" height="4" />

                            <!-- Z-Piece (Middle) -->
                            <rect x="10" y="8" width="4" height="4" />
                            <rect x="14" y="8" width="4" height="4" />
                            <rect x="14" y="12" width="4" height="4" />
                            <rect x="18" y="12" width="4" height="4" />
                        </svg>
                    </div>
                    <h2>Tetris</h2>
                    <p>Stack blocks, clear lines</p>
                </div>
                <div class="card-bg"></div>
            </a>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
